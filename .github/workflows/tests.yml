name: Tests

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: "Tests pytest — Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Installer les dépendances de production
        run: pip install -r requirements.txt

      - name: Installer les dépendances de développement
        run: pip install -r requirements-dev.txt

      # tkinter est nécessaire pour les imports des vues ;
      # sur ubuntu-latest il faut l'installer séparément.
      - name: Installer tkinter (Linux)
        run: sudo apt-get install -y python3-tk

      - name: Lancer les tests avec pytest
        run: pytest tests/ -v --tb=short

      - name: Rapport de couverture (optionnel)
        if: matrix.python-version == '3.11'
        run: |
          pip install pytest-cov
          pytest tests/ --cov=secure_encrypto --cov-report=term-missing --tb=short
